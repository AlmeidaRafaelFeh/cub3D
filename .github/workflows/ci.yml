name: cub3D CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libx11-dev libxext-dev libbsd-dev zlib1g-dev

      - name: Fetch MiniLibX
        run: |
          if [ ! -f minilibx-linux/mlx.h ]; then
            git clone --depth 1 https://github.com/42Paris/minilibx-linux.git minilibx-linux
          fi

      - name: Install norminette
        run: |
          python3 -m pip install --user norminette
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build project
        run: make

      - name: Run tests
        run: make test

      - name: Run norminette
        run: make norm